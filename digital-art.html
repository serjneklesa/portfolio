<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Art — Serj Neklesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__name" href="index.html">S/N</a>
      <span class="topbar__sep">/</span>
      <span class="topbar__page">Digital Art</span>
      <a class="topbar__nav" href="selected-work.html">Selected Work</a>
    </div>
  </header>

  <main class="page">
    <div class="content">
      <header class="case-head">
        <h1 class="reveal">Digital Art</h1>
        <p class="case-sub reveal">Illustration, graphics, and visual experiments.</p>
      </header>
    </div>

    <!-- Infinite panorama -->
    <div class="panorama" id="panorama">
      <div class="panorama__track" id="panorama-track"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© Serj Neklesa</span>
      <span>Made in Vienna</span>
    </div>
  </footer>

  <script>
    // Файлы из папки web-ready. Добавить фото = дописать строку сюда.
    // Если файла нет — он просто пропустится, ничего не сломается.
    const FOLDER = "web-ready/";
    const IMAGES = [
      "1-5.jpg", "2-6.jpg", "3-4.jpg", "4-2.jpg", "4-3.jpg", "4.jpg",
      "5-5.jpg", "7-1.jpg", "7-2.jpg", "9-1.jpg", "10-1.jpg", "13-1.jpg",
      "bezymyannyi-kadr1943.jpg", "bezymyannyi-kadr1982.jpg",
      "bluee.jpg", "fam-club.jpg", "flooriist-lenta-2.jpg",
      "hardkiss1.jpg", "hope-2.jpg", "image-13-01-26-at-14-47.jpg",
      "img-2022.jpg", "img-2845-2.jpg", "img-4454-2.jpg", "img-6008.jpg",
      "img-6412-2.jpg", "img-6830-2.jpg", "img-6832-2.jpg",
      "img-9614.jpg", "img-9857.jpg",
      "katarina7.jpg", "katarina8.jpg", "linda-u-chulo.jpg",
      "parfeniuk-3.jpg", "parfeniuk-12.jpg", "parfeniuk-16.jpg",
      "parfenu-iuk-wall-2.jpg", "parfenuiuk-wall-2.jpg",
      "sample-1.jpg", "sample-2.jpg", "sample-3.jpg",
      "sasha-1.jpg", "summer-cover-2.jpg", "uj1-2.jpg",
      "untitled-4-recovered.jpg",
    ];

    const track = document.getElementById("panorama-track");
    const SPEED = 60; // px в секунду — можно увеличить

    // two identical copies -> seamless -50% loop
    [...IMAGES, ...IMAGES].forEach(name => {
      const img = document.createElement("img");
      img.src = FOLDER + name;
      img.alt = "";
      img.decoding = "async";
      img.onerror = () => img.remove(); // missing file -> skip silently
      track.appendChild(img);
    });

    function setDuration() {
      const distance = track.scrollWidth / 2;
      if (distance > 0) {
        track.style.setProperty("--pan-duration", Math.max(20, distance / SPEED) + "s");
      }
    }
    window.addEventListener("load", setDuration);
    setTimeout(setDuration, 3000); // fallback while large images load
  </script>

</body>
</html>
