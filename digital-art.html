<body>

      <a class="topbar__name" href="index.html">S/N</a>

      <span class="topbar__page">Digital Art</span>
      <a class="topbar__nav" href="selected-work.html" data-i18n="nav.selectedwork">Selected Work</a>

      </div>
    </div>
  </header>

  <main class="page">
    <div class="content">
      <header class="case-head">
        <h1 class="reveal">Digital Art</h1>
        <p class="case-sub reveal" data-i18n="da.sub">Illustration, graphics, and visual experiments.</p>

    <!-- Infinite panoramas: left / right (reversed) / left (shuffled) -->
    <div class="panorama">
      <div class="panorama__track" data-row="forward"></div>
    </div>
    <div class="panorama panorama--reverse">
      <div class="panorama__track" data-row="backward"></div>
    </div>
    <div class="panorama">
      <div class="panorama__track" data-row="random"></div>
    </div>

    <div class="content">
      <section class="section" id="lets-create">
        <p class="eyebrow" data-i18n="lets.eyebrow">Let's Create</p>
        <p class="invite" data-i18n="lets.text">Hi! Got an idea, a brand, or just a feeling?<br><em>Let's create something together.</em></p>
        <p class="invite-link"><a href="mailto:neklesa.sergej@gmail.com" data-i18n="lets.cta">Say hello ↗</a></p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© Serj Neklesa</span>
      <span>Made in Vienna</span>
    </div>

  <script>
    // Файлы из папки web-ready. Добавить фото = дописать строку сюда.
    // Если файла нет — он просто пропустится, ничего не сломается.
    const FOLDER = "web-ready/";
    const IMAGES = [
      "1-5.jpg", "2-6.jpg", "3-4.jpg", "4-2.jpg", "4-3.jpg", "4.jpg",
      "5-5.jpg", "7-1.jpg", "7-2.jpg", "9-1.jpg", "10-1.jpg", "13-1.jpg",
      "bezymyannyi-kadr1943.jpg", "bezymyannyi-kadr1982.jpg",
      "bluee.jpg", "fam-club.jpg", "flooriist-lenta-2.jpg",
      "hardkiss1.jpg", "hope-2.jpg", "image-13-01-26-at-14-47.jpg",
      "img-2022.jpg", "img-2845-2.jpg", "img-4454-2.jpg", "img-6008.jpg",
      "img-6412-2.jpg", "img-6830-2.jpg", "img-6832-2.jpg",
      "img-9614.jpg", "img-9857.jpg",
      "katarina7.jpg", "katarina8.jpg", "linda-u-chulo.jpg",
      "parfeniuk-3.jpg", "parfeniuk-12.jpg", "parfeniuk-16.jpg",
      "parfenu-iuk-wall-2.jpg", "parfenuiuk-wall-2.jpg",
      "sample-1.jpg", "sample-2.jpg", "sample-3.jpg",
      "sasha-1.jpg", "summer-cover-2.jpg", "uj1-2.jpg",
      "untitled-4-recovered.jpg",
      "1232.jpg",
      "6 4.JPG",
      "ytyty.jpg",
      "popup3.jpg",
      "sera poster.jpg",
      "туц сщддусешщт.jpg",
      "parfeniuk 5.JPG",
      "parfeniuk 16.JPG",
      "scrt.png",
      "232218.png",
      "cachaca.jpg",
      "blody-mery.jpg",
      "nk-adicta-scaled.jpg",
      "img-2746-2.jpg",
    ];

    const SPEED = 60; // px per second

    // --- series detection: photos from one series must not stand next to each other ---
    function groupOf(name) {
      let n = name.replace(/\.(jpe?g|png)$/i, "");
      if (/^parfen/i.test(n)) return "parfeniuk";
      if (/^(nk-|cachaca|blody-mery)/i.test(n) || n === "img-2746-2") return "nk";          // parfeniuk-3 / parfenuiuk-wall-2 ...
      if (/^\d/.test(n)) return n.split("-")[0];           // "7-1", "7-2" -> "7"; "4", "4-2" -> "4"
      n = n.replace(/-\d+$/, "");                          // sample-1 -> sample, img-2845-2 -> img-2845
      n = n.replace(/([a-z])\d+$/i, "$1");                 // katarina7 -> katarina, kadr1943 -> kadr
      return n;
    }

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // shuffle + repair so that no two neighbours share a series
    // (including the loop seam: last item meets first item)
    function spreadShuffle(list) {
      let a = shuffle(list);
      const n = a.length;
      for (let pass = 0; pass < 30; pass++) {
        let ok = true;
        for (let i = 0; i < n; i++) {
          const prev = a[(i - 1 + n) % n];
          if (groupOf(a[i]) === groupOf(prev)) {
            ok = false;
            for (let j = 0; j < n; j++) {
              const jPrev = a[(j - 1 + n) % n];
              const jNext = a[(j + 1) % n];
              if (
                j !== i &&
                groupOf(a[j]) !== groupOf(prev) &&
                groupOf(a[i]) !== groupOf(jPrev) &&
                groupOf(a[i]) !== groupOf(jNext)
              ) {
                [a[i], a[j]] = [a[j], a[i]];
                break;
              }
            }
          }
        }
        if (ok) break;
      }
      return a;
    }

    const rows = {
      forward:  spreadShuffle(IMAGES),
      backward: spreadShuffle(IMAGES),
      random:   spreadShuffle(IMAGES),
    };

    document.querySelectorAll(".panorama__track").forEach(track => {
      const list = rows[track.dataset.row] || IMAGES;
      // two identical copies -> seamless -50% loop
      [...list, ...list].forEach(name => {
        const img = document.createElement("img");
        img.src = FOLDER + encodeURIComponent(name); // handles spaces & cyrillic in filenames
        img.alt = "";
        img.decoding = "async";
        img.onerror = () => img.remove(); // missing file -> skip silently
        track.appendChild(img);
      });
    });

    function setDurations() {
      document.querySelectorAll(".panorama__track").forEach(track => {
        const distance = track.scrollWidth / 2;
        if (distance > 0) {
          track.style.setProperty("--pan-duration", Math.max(20, distance / SPEED) + "s");
        }
      });
    }
    window.addEventListener("load", setDurations);
    setTimeout(setDurations, 3000); // fallback while large images load
  </script>

  <script src="i18n.js"></script>
</body>
</html>
