<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Art — Serj Neklesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__name" href="index.html">S/N</a>
      <span class="topbar__sep">/</span>
      <span class="topbar__page">Digital Art</span>
      <a class="topbar__nav" href="selected-work.html">Selected Work</a>
    </div>
  </header>

  <main class="page">
    <div class="content">
      <header class="case-head">
        <h1 class="reveal">Digital Art</h1>
        <p class="case-sub reveal">Illustration, graphics, and visual experiments.</p>
      </header>
    </div>

    <!-- Infinite panorama -->
    <div class="panorama" id="panorama">
      <div class="panorama__track" id="panorama-track"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© Serj Neklesa</span>
      <span>Made in Vienna</span>
    </div>
  </footer>

  <script>
    // ============================================================
    // ЗАМЕНИ ЭТОТ СПИСОК на имена файлов из папки web-ready.
    // Просто перечисли их через запятую, порядок = порядок в ленте.
    // ============================================================
    const IMAGES = [
      "web-ready/photo-01.jpg",
      "web-ready/photo-02.jpg",
      "web-ready/photo-03.jpg",
      "web-ready/photo-04.jpg",
      "web-ready/photo-05.jpg",
    ];

    const track = document.getElementById("panorama-track");
    const SPEED = 60; // px per second — увеличь, чтобы лента шла быстрее

    function build(list) {
      // two identical copies -> seamless -50% loop
      [...list, ...list].forEach(src => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = "";
        img.loading = "eager";
        img.onerror = () => img.remove(); // silently skip missing files
        track.appendChild(img);
      });
      // constant speed regardless of how many photos there are
      window.addEventListener("load", () => {
        const distance = track.scrollWidth / 2;
        track.style.setProperty("--pan-duration", Math.max(20, distance / SPEED) + "s");
      });
    }
    build(IMAGES);
  </script>

</body>
</html>
