<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__name" href="index.html">S/N</a>
      <span class="topbar__sep">/</span>
      <span class="topbar__page">Social Media</span>
      <a class="topbar__nav" href="selected-work.html">Selected Work</a>
    </div>
  </header>

  <main class="page">
    <div class="content">
      <header class="case-head">
        <h1 class="reveal">Social Media</h1>
        <p class="case-sub reveal">Content strategy and creation for social platforms.</p>
      </header>
    </div>

    <!-- looping panoramas mixing videos and photos -->
    <div class="panorama panorama--video">
      <div class="panorama__track" data-row="0"></div>
    </div>
    <div class="panorama panorama--video panorama--reverse">
      <div class="panorama__track" data-row="1"></div>
    </div>
    <div class="panorama panorama--video">
      <div class="panorama__track" data-row="2"></div>
    </div>

    <div class="content">
      <section class="section" id="lets-create">
        <p class="eyebrow">Let's Create</p>
        <p class="invite">
          Hi! Got an idea, a brand, or just a feeling?<br>
          <em>Let's create something together.</em>
        </p>
        <p class="invite-link"><a href="mailto:neklesa.sergej@gmail.com">Say hello ↗</a></p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© Serj Neklesa</span>
      <span>Made in Vienna</span>
    </div>
  </footer>

  <script>
    const FOLDER = "web-ready/";

    const SM_VIDEOS = [
      "1210442717",
      "1210442790",
      "1210442843",
      "1210442799",
      "1210442886",
      "1210442697",
      "1210222827",
      "587397666",
      "1210223333",
      "1210223165",
      "1210221413",
      "1210221409",
    ];

    const SM_PHOTOS = [
      "3-4.jpg",
      "4-3.jpg",
      "5-5.jpg",
      "flooriist-lenta-2.jpg",
      "image-13-01-26-at-14-47.jpg",
      "popup3.jpg",
      "1232.jpg",
      "ytyty.jpg",
    ];

    const HASHES = {"1210442646": "eba0e2037d", "1210442671": "bf5715b22d", "1210442695": "1366e94a4b", "1210442717": "c62bf89a0a", "1210442742": "bdb9a1750c", "1210442745": "1aa7bc77d4", "1210442799": "1704214c0f", "1210442843": "85bad5aafd", "1210442886": "b5ee377771"};
    const SPEED = 45; // px per second

    async function ratioOf(id) {
      try {
        const r = await fetch("https://vimeo.com/api/oembed.json?url=" +
          encodeURIComponent("https://vimeo.com/" + id + (HASHES[id] ? "/" + HASHES[id] : "")));
        const j = await r.json();
        if (j.width && j.height) return j.width + " / " + j.height;
      } catch (e) {}
      return "16 / 9";
    }

    function videoCell(id, ratio) {
      const cell = document.createElement("div");
      cell.className = "pan-v";
      cell.style.aspectRatio = ratio;
      const f = document.createElement("iframe");
      f.src = "https://player.vimeo.com/video/" + id +
              "?background=1&autoplay=1&muted=1&loop=1&playsinline=1" +
              (HASHES[id] ? "&h=" + HASHES[id] : "");
      f.title = "Video " + id;
      f.loading = "lazy";
      f.allow = "autoplay; fullscreen; picture-in-picture";
      cell.appendChild(f);
      return () => cell.cloneNode(true);
    }

    function photoCell(name) {
      return () => {
        const img = document.createElement("img");
        img.src = FOLDER + encodeURIComponent(name);
        img.alt = "";
        img.decoding = "async";
        img.onerror = () => img.remove();
        return img;
      };
    }

    async function build() {
      const vids = await Promise.all(
        SM_VIDEOS.map(async id => videoCell(id, await ratioOf(id)))
      );
      const photos = SM_PHOTOS.map(photoCell);

      // interleave: video, photo, video, photo...
      const mixed = [];
      const a = [...vids], b = [...photos];
      while (a.length || b.length) {
        if (a.length) mixed.push(a.shift());
        if (b.length) mixed.push(b.shift());
      }

      const rows = [[], [], []];
      mixed.forEach((make, i) => rows[i % 3].push(make));
      rows[1].reverse();

      document.querySelectorAll(".panorama__track").forEach(track => {
        const list = rows[+track.dataset.row] || [];
        // two identical copies -> seamless -50% loop
        [...list, ...list].forEach(make => track.appendChild(make()));
      });

      const setDurations = () => {
        document.querySelectorAll(".panorama__track").forEach(track => {
          const distance = track.scrollWidth / 2;
          if (distance > 0) {
            track.style.setProperty("--pan-duration", Math.max(30, distance / SPEED) + "s");
          }
        });
      };
      setDurations();
      setTimeout(setDurations, 3000);
    }
    build();
  </script>

</body>
</html>
