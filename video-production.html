<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Production — Serj Neklesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__name" href="index.html">S/N</a>
      <span class="topbar__sep">/</span>
      <span class="topbar__page">Video Production</span>
      <a class="topbar__nav" href="selected-work.html">Selected Work</a>
    </div>
  </header>

  <main class="page">
    <div class="content">
      <header class="case-head">
        <h1 class="reveal">Video Production</h1>
        <p class="case-sub reveal">Filming, editing, and post-production for brands and broadcast.</p>
      </header>
    </div>

    <!-- looping panoramas of playing videos: left / right / left -->
    <div class="panorama panorama--video">
      <div class="panorama__track" data-row="0"></div>
    </div>
    <div class="panorama panorama--video panorama--reverse">
      <div class="panorama__track" data-row="1"></div>
    </div>
    <div class="panorama panorama--video">
      <div class="panorama__track" data-row="2"></div>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© Serj Neklesa</span>
      <span>Made in Vienna</span>
    </div>
  </footer>

  <script>
    // Vimeo IDs в порядке показа
    const VIDEOS = [
      "1209432137",
      "1209429198",
      "587475938",
      "587412009",
      "587697482",
      "1210223333",
      "1210221415",
      "587411131",
      "1210221412",
      "1210223165",
    ];

    const SPEED = 45; // px per second

    async function ratioOf(id) {
      try {
        const r = await fetch("https://vimeo.com/api/oembed.json?url=" +
          encodeURIComponent("https://vimeo.com/" + id));
        const j = await r.json();
        if (j.width && j.height) return j.width + " / " + j.height;
      } catch (e) {}
      return "16 / 9";
    }

    function makeCell(id, ratio) {
      const cell = document.createElement("div");
      cell.className = "pan-v";
      cell.style.aspectRatio = ratio;
      const f = document.createElement("iframe");
      f.src = "https://player.vimeo.com/video/" + id +
              "?background=1&autoplay=1&muted=1&loop=1&playsinline=1";
      f.title = "Video " + id;
      f.loading = "lazy";
      f.allow = "autoplay; fullscreen; picture-in-picture";
      cell.appendChild(f);
      return cell;
    }

    async function build() {
      const meta = await Promise.all(
        VIDEOS.map(async id => ({ id, ratio: await ratioOf(id) }))
      );

      // split the videos across the three rows
      const rows = [[], [], []];
      meta.forEach((m, i) => rows[i % 3].push(m));
      rows[1].reverse(); // middle row runs right and starts from the end

      document.querySelectorAll(".panorama--video .panorama__track").forEach(track => {
        const list = rows[+track.dataset.row] || [];
        // two identical copies -> seamless -50% loop
        [...list, ...list].forEach(m => track.appendChild(makeCell(m.id, m.ratio)));
      });

      const setDurations = () => {
        document.querySelectorAll(".panorama--video .panorama__track").forEach(track => {
          const distance = track.scrollWidth / 2;
          if (distance > 0) {
            track.style.setProperty("--pan-duration", Math.max(30, distance / SPEED) + "s");
          }
        });
      };
      setDurations();
      setTimeout(setDurations, 3000);
    }
    build();
  </script>

</body>
</html>
