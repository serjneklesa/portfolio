<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__name" href="index.html">S/N</a>
      <span class="topbar__sep">/</span>
      <span class="topbar__page">Video Production</span>
      <a class="topbar__nav" href="selected-work.html">Selected Work</a>
    </div>
  </header>

  <main class="page">
    <div class="content">
      <header class="case-head">
        <h1 class="reveal">Video Production</h1>
        <p class="case-sub reveal">Filming, editing, and post-production for brands and broadcast.</p>
      </header>
    </div>

    <!-- looping panoramas of playing videos: directions alternate -->
    <div class="panorama panorama--video">
      <div class="panorama__track" data-row="0"></div>
    </div>
    <div class="panorama panorama--video panorama--reverse">
      <div class="panorama__track" data-row="1"></div>
    </div>
    <div class="panorama panorama--video">
      <div class="panorama__track" data-row="2"></div>
    </div>

    <div class="content">
      <section class="section" id="lets-create">
        <p class="eyebrow">Let's Create</p>
        <p class="invite">
          Hi! Got an idea, a brand, or just a feeling?<br>
          <em>Let's create something together.</em>
        </p>
        <p class="invite-link"><a href="mailto:neklesa.sergej@gmail.com">Say hello ↗</a></p>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© Serj Neklesa</span>
      <span>Made in Vienna</span>
    </div>
  </footer>

  <script>
    // Vimeo IDs в порядке показа
    const VIDEOS = [
      "1209432137",
      "1209429198",
      "587475938",
      "587412009",
      "587697482",
      "1210223333",
      "1210221415",
      "587411131",
      "1210221412",
      "1210223165",
      "1210442697",
      "1210442671",
      "1210442851",
      "1210442646",
      "1210442742",
      "1210442799",
      "1210442886",
      "1210442745",
      "1210442843",
      "1210442790",
      "1210442695",
      "1210442717",
      "1210449640",
    ];

    const HASHES = {"1210442646": "eba0e2037d", "1210442671": "bf5715b22d", "1210442695": "1366e94a4b", "1210442717": "c62bf89a0a", "1210442742": "bdb9a1750c", "1210442745": "1aa7bc77d4", "1210442799": "1704214c0f", "1210442843": "85bad5aafd", "1210442886": "b5ee377771"};
    const SPEED = 45; // px per second

    async function metaOf(id) {
      try {
        const r = await fetch("https://vimeo.com/api/oembed.json?url=" +
          encodeURIComponent("https://vimeo.com/" + id + (HASHES[id] ? "/" + HASHES[id] : "")));
        const j = await r.json();
        return {
          id,
          ratio: (j.width && j.height) ? j.width + " / " + j.height : "16 / 9",
          thumb: j.thumbnail_url || "",
        };
      } catch (e) { return null; } // unavailable video -> skipped entirely
    }

    function makeCell(m) {
      const cell = document.createElement("div");
      cell.className = "pan-v";
      cell.style.aspectRatio = m.ratio;
      const img = document.createElement("img");
      img.src = m.thumb;
      img.alt = "";
      img.decoding = "async";
      img.style.cssText = "width:100%;height:100%;object-fit:cover;display:block";
      cell.appendChild(img);
      cell.dataset.id = m.id;
      return cell;
    }

    function activate(cell) {
      const id = cell.dataset.id;
      const f = document.createElement("iframe");
      f.src = "https://player.vimeo.com/video/" + id +
              "?background=1&autoplay=1&muted=1&loop=1&playsinline=1" +
              (HASHES[id] ? "&h=" + HASHES[id] : "");
      f.title = "Video " + id;
      f.allow = "autoplay; fullscreen; picture-in-picture";
      cell.replaceChildren(f);
    }

    async function build() {
      const meta = (await Promise.all(VIDEOS.map(metaOf))).filter(Boolean);

      // split the videos across the three rows
      const rows = [[], [], []];
      meta.forEach((m, i) => rows[i % 3].push(m));
      rows[1].reverse(); // middle row runs right and starts from the end

      const cells = [];
      document.querySelectorAll(".panorama--video .panorama__track").forEach(track => {
        const list = rows[+track.dataset.row] || [];
        // two identical copies -> seamless -50% loop
        [...list, ...list].forEach(m => {
          const c = makeCell(m);
          track.appendChild(c);
          cells.push(c);
        });
      });

      const setDurations = () => {
        document.querySelectorAll(".panorama--video .panorama__track").forEach(track => {
          const distance = track.scrollWidth / 2;
          if (distance > 0) {
            track.style.setProperty("--pan-duration", Math.max(30, distance / SPEED) + "s");
          }
        });
      };
      setDurations();
      setTimeout(setDurations, 2500);

      // bring players alive gradually so the page loads fast
      let i = 0;
      const timer = setInterval(() => {
        if (i >= cells.length) return clearInterval(timer);
        activate(cells[i++]);
      }, 350);
    }
    build();

  </script>

</body>
</html>
