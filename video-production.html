<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Production — Serj Neklesa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <a class="topbar__name" href="index.html">S/N</a>
      <span class="topbar__sep">/</span>
      <span class="topbar__page">Video Production</span>
      <a class="topbar__nav" href="selected-work.html">Selected Work</a>
    </div>
  </header>

  <main class="page">
    <div class="content">
      <header class="case-head">
        <h1 class="reveal">Video Production</h1>
        <p class="case-sub reveal">Filming, editing, and post-production for brands and broadcast.</p>
      </header>
    </div>

    <div class="content" id="vp-list"><!-- videos are laid out here by script --></div>
  </main>

  <footer class="footer">
    <div class="footer__inner">
      <span>© Serj Neklesa</span>
      <span>Made in Vienna</span>
    </div>
  </footer>

  <script>
    // Vimeo IDs в исходном порядке
    const VIDEOS = [
      "1209432137",
      "1209429198",
      "587475938",
      "587412009",
      "587697482",
      "1210223333",
      "1210221415",
    ];

    const container = document.getElementById("vp-list");

    function makeIframe(id) {
      const f = document.createElement("iframe");
      f.src = "https://player.vimeo.com/video/" + id +
              "?autoplay=1&muted=1&loop=1&playsinline=1";
      f.title = "Video " + id;
      f.loading = "lazy";
      f.allow = "autoplay; fullscreen; picture-in-picture";
      f.allowFullscreen = true;
      return f;
    }

    // Determine orientation of each video via Vimeo's public oEmbed API
    async function getOrientation(id) {
      try {
        const r = await fetch(
          "https://vimeo.com/api/oembed.json?url=" +
          encodeURIComponent("https://vimeo.com/" + id)
        );
        const j = await r.json();
        return j.height > j.width ? "v" : "h";
      } catch (e) {
        return "h"; // fallback: treat as horizontal
      }
    }

    async function build() {
      const meta = await Promise.all(
        VIDEOS.map(async id => ({ id, o: await getOrientation(id) }))
      );

      const verticals = meta.filter(m => m.o === "v");
      const horizontals = meta.filter(m => m.o === "h");

      // Правило: два вертикальных в ряд, после них — горизонтальный
      while (verticals.length || horizontals.length) {
        if (verticals.length >= 2) {
          const row = document.createElement("div");
          row.className = "vp-pair";
          for (const m of verticals.splice(0, 2)) {
            const cell = document.createElement("div");
            cell.className = "vp-v";
            cell.appendChild(makeIframe(m.id));
            row.appendChild(cell);
          }
          container.appendChild(row);
          if (horizontals.length) {
            const wide = document.createElement("div");
            wide.className = "vp-wide";
            wide.appendChild(makeIframe(horizontals.shift().id));
            container.appendChild(wide);
          }
        } else if (horizontals.length) {
          const wide = document.createElement("div");
          wide.className = "vp-wide";
          wide.appendChild(makeIframe(horizontals.shift().id));
          container.appendChild(wide);
        } else {
          // остался один вертикальный без пары — показываем его одного в ряду
          const row = document.createElement("div");
          row.className = "vp-pair";
          const cell = document.createElement("div");
          cell.className = "vp-v";
          cell.appendChild(makeIframe(verticals.shift().id));
          row.appendChild(cell);
          container.appendChild(row);
        }
      }
    }
    build();
  </script>

</body>
</html>
